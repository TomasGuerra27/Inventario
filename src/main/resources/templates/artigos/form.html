<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head(${titulo})"></head>
<body>
    <nav th:replace="fragments/navbar :: navbar('artigos')"></nav>

    <main class="container py-4" data-page="artigos-form">
        <div class="row justify-content-center">
            <div class="col-xl-9">
                <section class="app-hero mb-4">
                    <div class="app-hero-copy">
                        <span class="badge text-bg-light mb-3" th:text="${modo == 'editar'} ? 'Edição' : 'Novo Artigo'">Novo</span>
                        <h1 class="display-6 mb-2" th:text="${titulo}">Artigo</h1>
                    </div>
                    <div class="app-hero-actions">
                        <a class="btn btn-outline-light btn-lg" th:href="@{/artigos}">Voltar</a>
                    </div>
                </section>

                <section class="card shadow-sm border-0">
                    <div class="card-body p-4 p-lg-5">
                        <form id="artigoForm" th:object="${artigoForm}" th:action="${modo == 'editar'} ? @{/artigos/{id}(id=${artigo.id})} : @{/artigos}" method="post" enctype="multipart/form-data">
                            
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label">Versão BIOS</label>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Consumo (Watts)</label>
                                    <input type="number" class="form-control" th:field="*{consumoWatts}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Socket Processador</label>
                                    <input type="text" class="form-control" th:field="*{socketProcessador}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Tipo Ligação</label>
                                    <input type="text" class="form-control" th:field="*{tipoLigacao}">
                                </div>

                                <div class="col-12">
                                    <label class="form-label">Imagem do Componente</label>
                                    <input type="file" class="form-control" th:field="*{imagem}" accept="image/*">
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="w11" th:field="*{suporteWindows11}">
                                        <label class="form-check-label" for="w11">Suporte Windows 11</label>
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="cam" th:field="*{cameraPrivacidade}">
                                        <label class="form-check-label" for="cam">Câmera com Privacidade</label>
                                    </div>
                                </div>

                                <div class="col-12 mt-4">
                                    <label class="form-label">Chave Admin</label>
                                    <input type="password" class="form-control" th:field="*{adminApiKey}" required>
                                    <div class="text-danger small" th:if="${#fields.hasErrors('adminApiKey')}" th:errors="*{adminApiKey}"></div>
                                </div>
                            </div>

                            <div class="mt-5">
                                <button type="submit" class="btn btn-primary px-4" th:text="${modo == 'editar'} ? 'Atualizar' : 'Guardar'">Guardar</button>
                                <a class="btn btn-outline-secondary px-4" th:href="@{/artigos}">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <div th:replace="fragments/scripts :: scripts(${pageScript})"></div>
</body>
</html>

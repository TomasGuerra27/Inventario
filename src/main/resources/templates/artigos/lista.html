<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head(${titulo})"></head>
<body>
    <nav th:replace="fragments/navbar :: navbar('artigos')"></nav>

    <main class="container py-4" data-page="artigos-lista">
        <section class="app-hero mb-4">
            <div class="app-hero-copy">
                <span class="badge text-bg-light mb-3">Hardware & Specs</span>
                <h1 class="display-6 mb-2">Artigos Técnicos</h1>
                <p class="text-secondary mb-0">
                    Base de dados de componentes. Operações via API em <code>/api/artigos</code>.
                </p>
            </div>
            <div class="app-hero-actions">
                <a class="btn btn-outline-light btn-lg" th:href="@{/artigos/scan}">Ler QR</a>
                <a class="btn btn-primary btn-lg" th:href="@{/artigos/novo}">Novo Artigo</a>
            </div>
        </section>

        <section class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-8">
                        <label class="form-label" for="adminApiKey">Chave de administrador</label>
                        <input type="password" class="form-control" id="adminApiKey" placeholder="Necessária para gerir registos">
                    </div>
                </div>
            </div>
        </section>

        <section class="table-responsive">
            <div class="grid-list">
                <div th:each="artigo : ${artigos}" class="grid-item">
                    <article class="card h-100 shadow-sm border-0">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <h3 class="h5 mb-0" th:text="${artigo.socketProcessador}">Socket</h3>
                                <code class="small text-secondary" th:text="${artigo.id}">#1</code>
                            </div>
                            <p class="mb-1 text-dark"><strong>Consumo:</strong> <span th:text="${artigo.consumoWatts}">0</span>W</p>
                            
                            <div class="mt-3">
                                <span class="badge rounded-pill" 
                                      th:classappend="${artigo.suporteWindows11} ? 'text-bg-success' : 'text-bg-secondary'"
                                      th:text="${artigo.suporteWindows11} ? 'Windows 11 OK' : 'Sem suporte W11'">W11</span>
                                <span class="badge rounded-pill" 
                                      th:classappend="${artigo.cameraPrivacidade} ? 'text-bg-info' : 'text-bg-secondary'"
                                      th:text="${artigo.cameraPrivacidade} ? 'Camera Privacy' : 'No Privacy'">Cam</span>
                            </div>
                        </div>
                     
                    </article>
                </div>
            </div>
        </section>
    </main>

    <div th:replace="fragments/scripts :: scripts(${pageScript})"></div>
</body>
</html>
